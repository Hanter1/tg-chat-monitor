name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_debug_apk:
        description: "Also upload debug APK (no release signing required)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

  android:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Must match chaquopy.defaultConfig.version (buildPython + app Python).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      # cibuildwheel+maturin fails for Android cross-compile; use maturin script
      # adapted from ririv/android-wheels (MIT) — see android/scripts/.
      - name: Build pydantic-core Android wheels
        working-directory: ${{ github.workspace }}
        env:
          LIBRARY_NAME: pydantic-core
          GIT_REPOSITORY: pydantic/pydantic-core
          VERSION_TAG: v2.41.5
          SOURCE_DIR: .
          TARGET_PYTHON_VERSION: "3.13"
          ANDROID_API: "24"
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pipx tomli-w
          pipx ensurepath
          export PATH="${HOME}/.local/bin:${PATH}"

          for pair in "arm64-v8a:aarch64-linux-android" "x86_64:x86_64-linux-android"; do
            ABI="${pair%%:*}"
            TRIPLET="${pair##*:}"
            export TARGET_ABI="$ABI"
            export TARGET_TRIPLET="$TRIPLET"
            echo "::group::Build pydantic-core for ${ABI}"
            rm -rf library-source output
            python android/scripts/build_android_wheel.py
            cp -v output/*.whl android/wheels/
            echo "::endgroup::"
          done
          ls -la android/wheels/

      - name: List Android wheels
        run: ls -la wheels

      - name: Prepare release keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::KEYSTORE_BASE64 secret missing — building debug APK only"
          fi

      - name: Build release APK
        if: steps.keystore.outputs.present == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew :app:assembleRelease --stacktrace

      - name: Build debug APK
        if: steps.keystore.outputs.present != 'true' || inputs.build_debug_apk == true || github.event_name == 'workflow_dispatch'
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Collect APKs
        id: apk
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          VERSION="${GITHUB_REF_NAME}"
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk \
              "$GITHUB_WORKSPACE/dist/tg-chat-monitor-${VERSION}-android.apk"
            # Stable name for README /releases/latest/download/ links
            cp app/build/outputs/apk/release/app-release.apk \
              "$GITHUB_WORKSPACE/dist/tg-chat-monitor-android.apk"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk \
              "$GITHUB_WORKSPACE/dist/tg-chat-monitor-${VERSION}-android-debug.apk"
            cp app/build/outputs/apk/debug/app-debug.apk \
              "$GITHUB_WORKSPACE/dist/tg-chat-monitor-android-debug.apk"
            # If no signed release, expose debug under the main stable name too
            if [ ! -f "$GITHUB_WORKSPACE/dist/tg-chat-monitor-android.apk" ]; then
              cp app/build/outputs/apk/debug/app-debug.apk \
                "$GITHUB_WORKSPACE/dist/tg-chat-monitor-android.apk"
            fi
            echo "debug=true" >> "$GITHUB_OUTPUT"
          fi
          ls -la "$GITHUB_WORKSPACE/dist"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: dist/*.apk
          if-no-files-found: warn

  windows-zip:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack Windows ZIP
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist staging
          rsync -a \
            --exclude '.git' \
            --exclude 'venv' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude 'android/.gradle' \
            --exclude 'android/**/build' \
            --exclude '*.session' \
            --exclude '*.db' \
            --exclude '.env' \
            ./ staging/tg-chat-monitor/
          (cd staging && zip -r "../dist/tg-chat-monitor-${VERSION}-windows.zip" tg-chat-monitor)
          cp "dist/tg-chat-monitor-${VERSION}-windows.zip" dist/tg-chat-monitor-windows.zip
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip

  publish:
    needs: [android, windows-zip]
    # Publish whatever succeeded (Windows ZIP even if Android failed).
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.windows-zip.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.apk' -o -name '*.zip' \) -exec cp {} dist/ \;
          ls -la dist
          if [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            ## Скачать

            | Платформа | Ссылка |
            |-----------|--------|
            | **Android** | [Скачать APK](https://github.com/Hanter1/tg-chat-monitor/releases/latest/download/tg-chat-monitor-android.apk) |
            | **Windows** | [Скачать ZIP](https://github.com/Hanter1/tg-chat-monitor/releases/latest/download/tg-chat-monitor-windows.zip) |

            ### Android (кратко)
            1. Скачайте APK и разрешите установку из неизвестных источников.
            2. **«Получить API ID и Hash»** → **«Вставить из буфера»** → Старт → войдите в Telegram.
            3. Добавьте чаты и слова → включите мониторинг.
            4. Исключите приложение из оптимизации батареи.

            Подробнее: [docs/android.md](docs/android.md)
